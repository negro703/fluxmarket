name: fluxmarket
description: "A professional E-commerce application built with Clean Architecture and BLoC pattern."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Functional Error Handling
  dartz: ^0.10.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Code Generation
  freezed_annotation: ^3.0.0

  # Local Storage
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Effects
  shimmer: ^3.0.0
  lottie: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator: ^2.7.0
  build_runner: ^2.4.14
  freezed: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
