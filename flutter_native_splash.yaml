# This file is the configuration file for flutter_native_splash.
# For more information, see: https://pub.dev/packages/flutter_native_splash

flutter_native_splash:
  # Color configuration
  color: "#4F46E5"  # Indigo-600 - primary brand color representing trust and commerce
  color_dark: "#0F172A"  # Dark background for dark mode

  # Platform-specific settings
  android: true
  ios: true
  web: false

  # Full screen mode (removes status bar background on Android)
  fullscreen: true

  # Flutter Native Splash Configuration for FluxMarket
  # Design Concept: 
  # - The splash screen reflects 'Flux' (movement/flow) through smooth color transitions
  # - Uses Indigo-600 (#4F46E5) as primary brand color representing trust and commerce
  # - Clean, minimal design that transitions smoothly to the app's theme
  # - No logo image needed - the app name will be displayed elegantly
