# Memory settings for heavy code generation (Freezed, Injectable, Hive)
org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=1G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# AndroidX
android.useAndroidX=true
android.newDsl=false
android.builtInKotlin=false

# Disable Kotlin incremental compilation to avoid daemon issues
kotlin.incremental=false
kotlin.incremental.jvm=false
kotlin.daemon.disable=true

# Gradle performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# Use system JDK instead of Android Studio embedded JDK
org.gradle.java.home=C:\\Program Files\\Java\\jdk-23
